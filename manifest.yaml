  - name: event-reviewer
    path: event-reviewer/SKILL.md
    role: meta
    version: 1
    version_date: 2026-03-28
    references: 1
    assets: 0
    depends_on: []
    feeds_into: []
    input_requirements: [skill_outputs]
    output_types: [review_report, remediation_plan]
    default_output: review_report

routing:
  organizing_an_event:
    - scenario: Plan a conference or summit
      start: event-planner
      then: all others as needed
      conditions:
        timeline_compressed: { skip: [event-sponsors], note: "No time to sell sponsorships" }
        budget_minimal: { skip: [event-sponsors, event-exhibition], note: "Focus on core delivery" }
    - scenario: Plan a webinar
      start: event-planner
      then: [event-content, event-registration, event-marketing]
      skip: [event-logistics, event-sponsors, event-exhibition]
      note: "Virtual-only — no physical logistics needed"
    - scenario: Create event content
      start: event-content
    - scenario: Build an event budget
      start: event-budget
    - scenario: Design a registration flow
      start: event-registration
      then: [event-content]
    - scenario: Create a speaker program
      start: event-speakers
      then: [event-content]
    - scenario: Build sponsorship packages
      start: event-sponsors
      then: [event-content]
    - scenario: Plan event marketing
      start: event-marketing
      then: [event-content]
    - scenario: Plan a hybrid event
      start: event-planner
      then: all others as needed
      conditions:
        always: { add_contingency: "15-20%", note: "Hybrid complexity premium" }

  participating_in_event:
    - scenario: Plan a trade show booth
      start: event-exhibition
      then: [event-budget, event-content]
    - scenario: Evaluate a sponsorship package
      start: event-exhibition
      then: [event-budget]
    - scenario: Post-show follow-up and ROI
      start: event-exhibition
      then: [event-analytics]

  after_the_event:
    - scenario: Create a post-event report
      start: event-analytics
    - scenario: Calculate ROI
      start: event-analytics
      then: [event-budget]
    - scenario: Full post-event review
      start: event-analytics
      then: [event-reviewer]
      note: "Cross-skill consistency check after all outputs are final"
