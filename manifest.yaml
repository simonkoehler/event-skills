collection:
  name: event-management-skills
  version: 1.0.0
  standard: agentskills.io/1.0
  license: Apache-2.0
  description: >
    12 AI agent skills covering the full B2B event lifecycle (10 specialist + 2 meta).
    Each skill is a self-contained module following the Agent Skills Open Standard.
  repository: https://github.com/simonkoehler/event-skills

skills:
  - name: event-planner
    path: event-planner/SKILL.md
    role: gateway
    version: 1
    version_date: 2026-03-28
    references: 12
    assets: 1
    depends_on: []
    feeds_into:
      - event-budget
      - event-content
      - event-speakers
      - event-logistics
      - event-registration
      - event-sponsors
      - event-analytics
      - event-marketing
    input_requirements: [event_type, event_format, attendee_count, event_date, location]
    output_types: [event_brief, timeline, checklist, raci_matrix, risk_register]
    default_output: event_brief

  - name: event-content
    path: event-content/SKILL.md
    role: specialist
    version: 1
    version_date: 2026-03-28
    references: 10
    assets: 1
    depends_on:
      - event-planner
    feeds_into:
      - event-speakers
      - event-marketing
      - event-registration
      - event-sponsors
      - event-analytics
    input_requirements: [event_name, event_type, event_format, event_date, audience, content_type]
    output_types: [email_sequence, social_posts, landing_page, speaker_bios, mc_script, session_descriptions]
    default_output: email_sequence

  - name: event-budget
    path: event-budget/SKILL.md
    role: specialist
    version: 1
    version_date: 2026-03-28
    references: 4
    assets: 0
    depends_on:
      - event-planner
    feeds_into:
      - event-sponsors
      - event-registration
      - event-analytics
      - event-logistics
    input_requirements: [event_type, event_format, attendee_count, event_date, location]
